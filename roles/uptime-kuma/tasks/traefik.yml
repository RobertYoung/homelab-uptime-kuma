---
- name: Create traefik config directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Create traefik dynamic config directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/dynamic"
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Create traefik static config
  become: true
  ansible.builtin.template:
    src: "templates/traefik/traefik.yml.j2"
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  notify: "Restart traefik"

- name: Create traefik dynamic TLS config
  become: true
  ansible.builtin.template:
    src: "templates/traefik/dynamic/tls.yml.j2"
    dest: "{{ traefik_config_dir }}/dynamic/tls.yml"
    owner: root
    group: root
    mode: "0644"
  notify: "Restart traefik"

- name: Create traefik dynamic services config
  become: true
  ansible.builtin.template:
    src: "templates/traefik/dynamic/services.yml.j2"
    dest: "{{ traefik_config_dir }}/dynamic/services.yml"
    owner: root
    group: root
    mode: "0644"
  notify: "Restart traefik"
