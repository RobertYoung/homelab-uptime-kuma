---
- name: Get service user info for {{ service_user }}
  ansible.builtin.getent:
    database: passwd
    key: "{{ service_user }}"

- name: Set service UID/GID facts
  ansible.builtin.set_fact:
    service_uid: "{{ getent_passwd[service_user][1] }}"
    service_gid: "{{ getent_passwd[service_user][2] }}"

- name: Create Quadlet directory
  become: true
  ansible.builtin.file:
    path: "{{ quadlet_dir }}"
    state: directory
    mode: "0755"

- name: Deploy Quadlet network
  become: true
  ansible.builtin.template:
    src: "templates/quadlet/uptime-kuma.network.j2"
    dest: "{{ quadlet_dir }}/uptime-kuma.network"
    mode: "0644"
  notify: Reload systemd

- name: Deploy Quadlet volume
  become: true
  ansible.builtin.template:
    src: "templates/quadlet/uptime-kuma-data.volume.j2"
    dest: "{{ quadlet_dir }}/uptime-kuma-data.volume"
    mode: "0644"
  notify: Reload systemd

- name: Deploy uptime-kuma container quadlet
  become: true
  ansible.builtin.template:
    src: "templates/quadlet/uptime-kuma.container.j2"
    dest: "{{ quadlet_dir }}/uptime-kuma.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart uptime-kuma

- name: Deploy traefik container quadlet
  become: true
  ansible.builtin.template:
    src: "templates/quadlet/traefik.container.j2"
    dest: "{{ quadlet_dir }}/traefik.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik

- name: Deploy backup-toolkit container quadlet
  become: true
  ansible.builtin.template:
    src: "templates/quadlet/backup-toolkit.container.j2"
    dest: "{{ quadlet_dir }}/backup-toolkit.container"
    mode: "0644"
  notify:
    - Reload systemd
    - Restart backup-toolkit

- name: Reload systemd daemon
  become: true
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start services
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - uptime-kuma
    - traefik
